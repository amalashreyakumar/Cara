<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Viewport for Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Page Title -->
    <title>Cara — Modern E-Commerce</title>

    <!-- Favicon -->
    <link rel="icon" type="image/jpg" sizes="32x32" href="images/favicon.jpg">

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Shop the latest trends on our e-commerce store. Dark theme supported for a better user experience.">
    <meta name="keywords" content="e-commerce, shopping, online store, dark mode, buy online, latest fashion">
    <meta name="author" content="Cara">
    <meta name="robots" content="index, follow">

    <!-- Language -->
    <meta http-equiv="Content-Language" content="en">

    <!-- Open Graph (OG) Tags -->
    <meta property="og:title" content="E-commerce - Dark Theme Working">
    <meta property="og:description" content="Shop the latest trends with our dark mode-enabled e-commerce experience.">
    <meta property="og:image" content="https://example.com/images/preview.jpg">
    <meta property="og:url" content="https://example.com/">
    <meta property="og:type" content="website">

    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="E-commerce - Dark Theme Working">
    <meta name="twitter:description" content="Dark theme e-commerce site with modern features.">
    <meta name="twitter:image" content="https://example.com/images/preview.jpg">
    <meta name="twitter:site" content="@janavipandole">

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="register.css">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer" />
</head>

<body>

    <div id="particles-js"></div>

    <div class="container">

        <div class="form-box">

            <!-- Back to Home Link -->
            <div class="back-home-container">
                <a href="index.html" class="back-home">
                    ← Back to Home
                </a>
            </div>

            <h2>Register</h2>

            <p>Namaste!! &#128075;</p>

            <form id="registerForm">

                <div class="input-group">
                    <input type="text" id="registerUsername" required class="input-field">
                    <label for="registerUsername">Username</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="registerEmail" required class="input-field">
                    <label for="registerEmail">Email</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="registerPassword" required class="input-field">
                    <label for="registerPassword">Password</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="registerConfirmPassword" required class="input-field">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <div class="glow-line"></div>
                </div>

                <div class="remember-forgot">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span>REGISTER</span>
                    <div class="btn-glow"></div>
                </button>

                <div class="signup-link">
                    Already have an account?
                    <a href="login.html">Login</a>
                </div>

            </form>
        </div>
    </div>

    <!-- Particles JS -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            particlesJS('particles-js', {
                "particles": {
                    "number": {
                        "value": 100,
                        "density": {
                            "enable": true,
                            "value_area": 800
                        }
                    },
                    "color": {
                        "value": "#00d4ff"
                    },
                    "shape": {
                        "type": "circle"
                    },
                    "opacity": {
                        "value": 0.8,
                        "random": true
                    },
                    "size": {
                        "value": 5,
                        "random": true
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#00d4ff",
                        "opacity": 0.6,
                        "width": 1.5
                    },
                    "move": {
                        "enable": true,
                        "speed": 2,
                        "random": true
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "repulse"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        }
                    }
                },
                "retina_detect": true
            });
        });
    </script>

    <!-- Register JS -->
    <script src="register.js"></script>

</body>

</html>
