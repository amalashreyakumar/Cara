<body>
    <div id="particles-js"></div>

    <div class="container">
        <div class="form-box">

            <a href="index.html" class="back-home">
                ← Back to Home
            </a>

            <h2>Register</h2>
            <p>Namaste!!&#128075;</p>

            <form id="registerForm">
                <div class="input-group">
                    <input type="text" id="registerUsername" required class="input-field">
                    <label for="registerUsername">Username</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="text" id="registerEmail" required class="input-field">
                    <label for="registerEmail">Email</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="registerPassword" required class="input-field">
                    <label for="registerPassword">Password</label>
                    <div class="glow-line"></div>
                </div>

                <div class="input-group">
                    <input type="password" id="registerConfirmPassword" required class="input-field">
                    <label for="registerConfirmPassword">Confirm Password</label>
                    <div class="glow-line"></div>
                </div>

                <div class="remember-forgot">
                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <span>REGISTER</span>
                    <div class="btn-glow"></div>
                </button>

                <div class="signup-link">
                    Already have an account? <a href="login.html">Login</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            particlesJS('particles-js', {
                "particles": {
                    "number": {
                        "value": 100,
                        "density": {
                            "enable": true,
                            "value_area": 800
                        }
                    },
                    "color": {
                        "value": "#00d4ff"
                    },
                    "shape": {
                        "type": "circle",
                        "stroke": {
                            "width": 0,
                            "color": "#000000"
                        }
                    },
                    "opacity": {
                        "value": 0.8,
                        "random": true
                    },
                    "size": {
                        "value": 5,
                        "random": true
                    },
                    "line_linked": {
                        "enable": true,
                        "distance": 150,
                        "color": "#00d4ff",
                        "opacity": 0.6,
                        "width": 1.5
                    },
                    "move": {
                        "enable": true,
                        "speed": 2,
                        "random": true
                    }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": {
                        "onhover": {
                            "enable": true,
                            "mode": "repulse"
                        },
                        "onclick": {
                            "enable": true,
                            "mode": "push"
                        }
                    }
                },
                "retina_detect": true
            });
        });
    </script>

    <script src="register.js"></script>
</body>
